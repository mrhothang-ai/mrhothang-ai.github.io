<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IL-Sung Tech – Hệ Thống Báo Cáo · 보고 시스템</title>
<style>
  :root {
    --navy:      #0D2E5E;
    --navy-mid:  #1A4A8A;
    --navy-light:#2D6BB0;
    --green:     #1B7A3E;
    --red:       #C0392B;
    --amber:     #D97706;
    --slate:     #475569;
    --bg:        #EEF2F7;
    --white:     #FFFFFF;
    --border:    #CBD5E1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", Arial, sans-serif; background: var(--bg); color: #1E293B; min-height: 100vh; }

  /* HEADER */
  .header {
    background: #0D2E5E;
    padding: 20px 28px;
    display: flex; align-items: center; gap: 16px;
  }
  .header-logo { width:56px; height:56px; border-radius:12px; overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .header-logo img { width:100%; height:100%; object-fit:contain; }
  .header-text h1 { color:#fff; font-size:20px; font-weight:700; letter-spacing:.4px; }
  .header-text p  { color:#93B8E0; font-size:11px; margin-top:3px; }
  .header-right   { margin-left:auto; text-align:right; color:#93B8E0; font-size:11px; line-height:1.7; }
  .header-right strong { color:#fff; font-size:18px; display:block; }
  .header-admin {
    background: rgba(255,255,255,.1);
    color: #fff; border: none; border-radius: 7px;
    padding: 7px 14px; font-size: 11px; font-weight: 600;
    cursor: pointer; font-family: inherit; text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
    transition: background .15s; white-space: nowrap;
  }
  .header-admin:hover { background: rgba(255,255,255,.2); }

  /* WRAPPER */
  .wrapper { max-width: 900px; margin: 0 auto; padding: 20px 20px 48px; }

  /* LOADING */
  .loading {
    text-align: center; padding: 60px 20px;
    color: var(--slate); font-size: 13px;
  }
  .loading .spinner {
    width: 32px; height: 32px; border: 3px solid #E2E8F0;
    border-top-color: var(--navy); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ERROR */
  .error-box {
    background: #FEF2F2; border: 1px solid #FECACA;
    border-radius: 10px; padding: 20px 24px; margin: 20px 0;
    color: var(--red); font-size: 13px; line-height: 1.6;
  }
  .error-box strong { display: block; margin-bottom: 6px; font-size: 14px; }

  /* STATS BAR */
  .stats-toggle {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--white); border-radius: 10px; padding: 10px 16px;
    cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    margin-bottom: 4px; user-select: none; transition: background .15s;
  }
  .stats-toggle:hover { background: #F8FAFC; }
  .stats-toggle-left { display:flex; align-items:center; gap:10px; font-size:12px; font-weight:600; color:var(--slate); }
  .stats-mini { display:flex; gap:20px; align-items:center; }
  .stats-mini-item { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--slate); }
  .stats-mini-item strong { color:var(--navy); font-size:14px; }
  .toggle-arrow { font-size:12px; color:#94A3B8; transition:transform .25s; }
  .toggle-arrow.open { transform:rotate(180deg); }
  .stats-panel { background:var(--white); border-radius:0 0 10px 10px; overflow:hidden; max-height:0; transition:max-height .3s ease; box-shadow:0 2px 4px rgba(0,0,0,.05); }
  .stats-panel.open { max-height:200px; }
  .stats-bar { display:flex; gap:0; padding:16px 20px; border-top:1px solid #F1F5F9; flex-wrap:wrap; }
  .stat-item { text-align:center; flex:1; min-width:100px; padding:4px 8px; border-right:1px solid var(--border); }
  .stat-item:last-child { border-right:none; }
  .stat-num { font-size:26px; font-weight:700; color:var(--navy); }
  .stat-lbl { font-size:10px; color:var(--slate); margin-top:2px; text-transform:uppercase; letter-spacing:.3px; }

  /* SECTION */
  .section-label {
    font-size:11px; font-weight:700; color:var(--slate);
    text-transform:uppercase; letter-spacing:.6px;
    margin-bottom:8px; margin-top:22px;
    display:flex; align-items:center; gap:8px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .section-count { font-size:10px; font-weight:700; background:var(--navy); color:#fff; padding:1px 8px; border-radius:20px; }
  .section-toggle {
    display:flex; align-items:center; gap:6px; cursor:pointer;
    font-size:10px; font-weight:600; color:var(--slate);
    background:#F1F5F9; border:1px solid var(--border); border-radius:6px;
    padding:2px 10px 2px 8px; user-select:none; transition:background .15s; white-space:nowrap;
  }
  .section-toggle:hover { background:#E2E8F0; }
  .section-toggle .sarrow { font-size:10px; transition:transform .25s; }
  .section-toggle.collapsed .sarrow { transform:rotate(-90deg); }
  .report-list { display:flex; flex-direction:column; gap:6px; }
  .report-list.collapsed .report-row:nth-child(n+4) { display:none; }

  /* REPORT ROW */
  .report-row {
    background:var(--white); border-radius:9px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
    display:flex; align-items:center; gap:12px;
    padding:10px 14px; text-decoration:none; color:inherit;
    transition:transform .12s, box-shadow .12s, background .12s;
    border-left:4px solid transparent;
  }
  .report-row:hover { transform:translateX(3px); box-shadow:0 3px 12px rgba(13,46,94,.1); background:#FAFBFF; }
  .report-row.planned { opacity:.55; pointer-events:none; }

  /* dept colors */
  .row-hr  { border-left-color:#1A4A8A; } .row-pro { border-left-color:#1B7A3E; }
  .row-qc  { border-left-color:#7C3AED; } .row-eqm { border-left-color:#B45309; }
  .row-mm  { border-left-color:#0E7A6E; } .row-ehs { border-left-color:#C0392B; }

  .row-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .icon-hr{background:#EFF6FF;} .icon-pro{background:#F0FDF4;} .icon-qc{background:#F5F3FF;}
  .icon-eqm{background:#FFFBEB;} .icon-mm{background:#F0FDFA;} .icon-ehs{background:#FEF2F2;}

  .row-body { flex:1; display:flex; align-items:center; gap:10px; min-width:0; }
  .row-code { font-size:10px; font-weight:700; font-family:"Courier New",monospace; letter-spacing:.4px; white-space:nowrap; flex-shrink:0; padding:2px 8px; border-radius:5px; background:#F1F5F9; color:var(--slate); }
  .row-divider { width:1px; height:16px; background:var(--border); flex-shrink:0; }
  .row-title { font-size:15px; font-weight:700; color:var(--navy); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:.1px; }
  .report-row:not(.planned):hover .row-title { color:var(--navy-light); }

  .row-right { display:flex; align-items:center; gap:10px; flex-shrink:0; margin-left:auto; }
  .row-freq { font-size:10px; color:#94A3B8; white-space:nowrap; }
  .row-status { font-size:10px; font-weight:700; padding:2px 10px; border-radius:20px; white-space:nowrap; }
  .status-live    { background:#DCFCE7; color:#166534; }
  .status-dev     { background:#FEF9C3; color:#854D0E; }
  .status-planned { background:#F1F5F9; color:#64748B; }
  .row-arrow { color:#CBD5E1; font-size:14px; flex-shrink:0; }
  .report-row:not(.planned) .row-arrow { color:#94A3B8; }

  /* FOOTER */
  .footer { text-align:center; margin-top:36px; font-size:11px; color:#94A3B8; line-height:1.8; }
  .footer strong { color:var(--slate); }

  /* UPDATED AT */
  .updated-at { font-size:10px; color:#94A3B8; margin-left:auto; }

  @media(max-width:600px){
    .header { flex-direction:column; align-items:flex-start; gap:10px; }
    .header-right { margin-left:0; text-align:left; }
    .stats-mini { display:none; }
    .row-freq { display:none; }
  }
</style>
</head>

<script>
// ═══════════════════════════════════
// CONFIG
// ═══════════════════════════════════
const REPORTS_JSON = './reports.json';

const DEPT_META = {
  hr:  { label: '👥 Nhân Sự – HR · 인사',      iconCls: 'icon-hr',  rowCls: 'row-hr'  },

// ═══════════════════════════════════
// CLOCK
// ═══════════════════════════════════
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const yy = now.getFullYear();
  document.getElementById('clock').textContent = hh+':'+mm;
  document.getElementById('date-display').textContent = dd+'/'+mo+'/'+yy;
}
updateClock();
setInterval(updateClock, 1000);

// ═══════════════════════════════════
// STATS TOGGLE
// ═══════════════════════════════════
function toggleStats() {
  const panel = document.getElementById('stats-panel');
  const arrow = document.getElementById('stats-arrow');
  const mini  = document.getElementById('stats-mini');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
  mini.style.opacity = isOpen ? '1' : '0';
}

// ═══════════════════════════════════
// SECTION TOGGLE
// ═══════════════════════════════════
function toggleSection(btn, listId) {
  const list = document.getElementById(listId);
  const isCollapsed = list.classList.contains('collapsed');
  const rows  = list.querySelectorAll('.report-row');
  const extra = rows.length - 3;
  list.classList.toggle('collapsed', !isCollapsed);
  btn.classList.toggle('collapsed', !isCollapsed);
  btn.querySelector('span').textContent = isCollapsed ? 'Thu gọn' : 'Xem thêm ('+extra+')';
}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function renderApp(data) {
  const reports = data.reports || [];
  const config  = data.config  || {};

  // Update site name
  if (config.siteName) document.getElementById('site-name').textContent = config.siteName;

  // Update admin link to use siteUrl if available
  if (config.siteUrl) {
    const adminLink = document.querySelector('.header-admin');
    if (adminLink) adminLink.href = config.siteUrl + '/admin.html';
  }

  const app = document.getElementById('app');

  if (reports.length === 0) {
    app.innerHTML = '<div class="loading" style="color:#94A3B8;">📭 Chưa có báo cáo nào.<br><a href="./admin.html" style="color:var(--navy-mid);font-weight:600;">→ Vào trang quản lý để thêm</a></div>';
    return;
  }

  // Stats
  const total   = reports.length;
  const live    = reports.filter(r => r.trang_thai === 'live').length;
  const dev     = reports.filter(r => r.trang_thai === 'dev').length;
  const depts   = [...new Set(reports.map(r => r.nhom))].length;

  // Group by nhom – preserve insertion order
  const groups = {};
  reports.forEach(r => {
    if (!groups[r.nhom]) groups[r.nhom] = [];
    groups[r.nhom].push(r);
  });

  let html = '';

  // ── Stats bar ──
  html += `
  <div class="stats-toggle" onclick="toggleStats()">
    <div class="stats-toggle-left">📊 Tổng quan hệ thống · 시스템 현황</div>
    <div class="stats-mini" id="stats-mini">
      <div class="stats-mini-item"><strong>${live}</strong> đang dùng</div>
      <div class="stats-mini-item"><strong>${dev}</strong> đang xây dựng</div>
      <div class="stats-mini-item"><strong>${depts}</strong> bộ phận</div>
    </div>
    <span class="toggle-arrow" id="stats-arrow">▼</span>
  </div>
  <div class="stats-panel" id="stats-panel">
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-num">${total}</div><div class="stat-lbl">Tổng báo cáo · 총 보고서</div></div>
      <div class="stat-item"><div class="stat-num">${live}</div><div class="stat-lbl">Đang hoạt động · 운영 중</div></div>
      <div class="stat-item"><div class="stat-num">${dev}</div><div class="stat-lbl">Đang xây dựng · 구축 중</div></div>
      <div class="stat-item"><div class="stat-num">${depts}</div><div class="stat-lbl">Bộ phận · 부서</div></div>
    </div>
  </div>`;

  // ── Sections ──
  Object.keys(groups).forEach((nhom, gi) => {
    const meta    = DEPT_META[nhom] || { label: nhom.toUpperCase(), iconCls: 'icon-hr', rowCls: 'row-hr' };
    const items   = groups[nhom];
    const listId  = 'list-' + nhom + '-' + gi;
    const btnId   = 'btn-'  + nhom + '-' + gi;
    const hasMore = items.length > 3;

    html += `
  <div class="section-label">
    ${meta.label}
    <span class="section-count">${items.length}</span>
    ${hasMore ? `<button class="section-toggle collapsed" id="${btnId}" onclick="toggleSection(this,'${listId}')"><span>Xem thêm (${items.length-3})</span><span class="sarrow">▼</span></button>` : ''}
  </div>
  <div class="report-list${hasMore ? ' collapsed' : ''}" id="${listId}">`;

    items.forEach(r => {
      const isLive    = r.trang_thai === 'live';
      const rowTag    = isLive ? 'a' : 'div';
      const hrefAttr  = isLive ? `href="${r.link}"` : '';
      const planned   = !isLive ? ' planned' : '';
      html += `
    <${rowTag} class="report-row ${meta.rowCls}${planned}" ${hrefAttr}>
      <div class="row-icon ${meta.iconCls}">${r.icon || '📋'}</div>
      <div class="row-body">
        <div class="row-code">${r.ma}</div>
        <div class="row-divider"></div>
        <div class="row-title">${r.ten}</div>
      </div>
      <div class="row-right">
        <div class="row-freq">🔄 ${r.tan_suat}</div>
        ${STATUS_HTML[r.trang_thai] || STATUS_HTML.planned}
        <div class="row-arrow">›</div>
      </div>
    </${rowTag}>`;
    });

    html += '</div>';
  });

  // ── Footer ──
  const updatedAt = config.updatedAt ? `Cập nhật: ${config.updatedAt}` : '';
  html += `
  <div class="footer">
    <strong>${config.siteName || 'IL-Sung Tech · Hệ thống báo cáo nội bộ'}</strong><br>
    Quản lý bởi Bộ phận HR · HR 관리 &nbsp;·&nbsp; ${updatedAt}
  </div>`;

  app.innerHTML = html;
}

// ═══════════════════════════════════
// LOAD JSON
// ═══════════════════════════════════
async function loadReports() {
  const app = document.getElementById('app');
  try {
    const res = await fetch(REPORTS_JSON + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    // Support old format (plain array)
    if (Array.isArray(data)) {
      renderApp({ reports: data, config: {} });
    } else {
      renderApp(data);
    }
  } catch (err) {
    // Fallback: show helpful error
    app.innerHTML = `
      <div class="error-box">
        <strong>⚠ Không tìm thấy file reports.json</strong>
        Trang chủ cần file <code>reports.json</code> cùng thư mục để hiển thị danh sách báo cáo.<br><br>
        <strong>Cách khắc phục:</strong><br>
        1. Mở file <a href="./admin.html" style="color:var(--red);font-weight:600;">admin.html</a> để quản lý báo cáo<br>
        2. Thêm báo cáo → Tải file <strong>reports.json</strong><br>
        3. Upload <strong>reports.json</strong> lên GitHub cùng thư mục với index.html<br><br>
        <span style="font-size:11px;color:#94A3B8;">Chi tiết lỗi: ${err.message}</span>
      </div>`;
  }
}

loadReports();
</script>
</body>
</html>
